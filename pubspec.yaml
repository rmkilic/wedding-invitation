name: wedding_invidatiton
description: "Wedding invidatiton web app"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.5


dependencies:
  flutter:
    sdk: flutter

  #firebase
  firebase_core: ^4.9.0
  firebase_remote_config: ^6.5.1

  #state management
  flutter_bloc: ^9.1.1

  #DI
  injectable: ^3.0.0  
  get_it: ^9.2.1

  #utilty
  dartz: ^0.10.1
  equatable: ^2.0.8
  logger: ^2.7.0
  intl: ^0.20.2
  url_launcher: ^6.3.2
  
  #local db
  hive_ce_flutter: ^2.3.4

  #animation
  lottie: ^3.3.3


  go_router: ^17.2.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  flutter_gen_runner: ^5.14.1
  injectable_generator: ^3.0.2



flutter:
  uses-material-design: true
  
  assets:
    - assets/animations/

flutter_gen:
  output: lib/core/gen/
  integrations:
    flutter_svg: true
    lottie: true


